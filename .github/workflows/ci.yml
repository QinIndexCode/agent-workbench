name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

permissions:
  contents: read

jobs:
  hygiene-and-build:
    name: Hygiene, Build, And Focused Tests
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Secret hygiene
        run: npm.cmd run secret-hygiene

      - name: Repository hygiene
        run: npm.cmd run repo-hygiene

      - name: Backend build
        run: npm.cmd run build -w backend

      - name: Backend typecheck
        run: npm.cmd run typecheck -w backend

      - name: Frontend typecheck
        run: npm.cmd run typecheck -w frontend

      - name: Frontend build
        run: npm.cmd run build -w frontend

      - name: Focused backend regression tests
        run: >
          node --test --test-isolation=none --test-concurrency=1
          backend/tests/repo-hygiene.test.cjs
          backend/tests/providers.test.cjs
          backend/tests/functional-lines.test.cjs
          backend/tests/cli-interface.test.cjs

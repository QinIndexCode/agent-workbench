name: ci

on:
  push:
  pull_request:

jobs:
  portable-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm run audit:prod

      - name: Verify portable source and build
        run: |
          npm run lint
          npm run typecheck
          npm run check:release-source
          npm run build

  release-quality:
    runs-on: windows-latest
    timeout-minutes: 120
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm.cmd ci

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Audit production dependencies
        run: npm.cmd run audit:prod

      - name: Run release quality suite
        run: npm.cmd run quality:full

      - name: Upload quality artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: release-quality-artifacts
          path: |
            data/test-reports/**
            docs/reports/*.md
          if-no-files-found: warn

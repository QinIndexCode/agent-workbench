name: Bug report
description: Report reproducible incorrect behavior
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Do not include API keys, private data, or security vulnerabilities.
  - type: textarea
    id: behavior
    attributes:
      label: Observed behavior
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest reliable sequence of steps.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Node.js version, and browser or CLI details
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Redacted evidence
      description: Include relevant logs or screenshots after removing secrets.


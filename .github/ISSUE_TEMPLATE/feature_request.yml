name: Feature request
description: Propose a concrete product improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the user problem, not only the proposed implementation.
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: What should become possible?
    validations:
      required: true
  - type: textarea
    id: boundaries
    attributes:
      label: Security and compatibility considerations
      description: Note permission, persistence, provider, Web, or CLI implications.

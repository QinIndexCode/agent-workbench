version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
    groups:
      development-tooling:
        dependency-type: development
      production-dependencies:
        dependency-type: production
